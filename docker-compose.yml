services:
  backend:
    build:
      context: ./backend
    container_name: smartfeed-backend
    environment:
      PROJECT_NAME: ${PROJECT_NAME:-SmartFeed Backend}
      ENVIRONMENT: ${ENVIRONMENT:-local}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://smartfeed:smartfeed@postgres:5432/smartfeed}
      MONGODB_URL: ${MONGODB_URL:-mongodb://smartfeed:smartfeed@mongo:27017/smartfeed?authSource=admin}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
      SPARK_MASTER_URL: ${SPARK_MASTER_URL:-spark://spark-master:7077}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./bigdata/generator:/app/generator:ro
      - ./bigdata/data:/app/data
    depends_on:
      - postgres
      - mongo
      - kafka
      - spark-master
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16
    container_name: smartfeed-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smartfeed}
      POSTGRES_USER: ${POSTGRES_USER:-smartfeed}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartfeed}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongo:
    image: mongo:7
    container_name: smartfeed-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-smartfeed}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-smartfeed}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: smartfeed-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: smartfeed-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    ports:
      - "9092:9092"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: smartfeed-kafka-ui
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: smartfeed-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      DYNAMIC_CONFIG_ENABLED: "true"
    ports:
      - "8085:8080"

  spark-master:
    build:
      context: ./bigdata/spark
    image: smartfeed-spark:3.5.6
    container_name: smartfeed-spark-master
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
      KAFKA_USER_EVENTS_TOPIC: ${KAFKA_USER_EVENTS_TOPIC:-smartfeed.user_events}
      MONGODB_URL: ${MONGODB_URL:-mongodb://smartfeed:smartfeed@mongo:27017/smartfeed?authSource=admin}
      MONGO_DB: ${MONGO_DB:-smartfeed}
      MONGO_RAW_EVENTS_COLLECTION: ${MONGO_RAW_EVENTS_COLLECTION:-raw_user_events}
      POSTGRES_USER: ${POSTGRES_USER:-smartfeed}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartfeed}
      POSTGRES_JDBC_URL: ${POSTGRES_JDBC_URL:-jdbc:postgresql://postgres:5432/smartfeed}
      SPARK_STARTING_OFFSETS: ${SPARK_STARTING_OFFSETS:-latest}
      SPARK_CHECKPOINT_DIR: ${SPARK_CHECKPOINT_DIR:-/opt/spark/work-dir/data/checkpoints/structured_streaming}
      SPARK_OUTPUT_BASE: ${SPARK_OUTPUT_BASE:-/opt/spark/work-dir/data/streaming}
      SPARK_PROCESSING_TIME: ${SPARK_PROCESSING_TIME:-10 seconds}
      RECOMMENDATION_TOP_N: ${RECOMMENDATION_TOP_N:-10}
      RECOMMENDATION_MIN_EVENTS: ${RECOMMENDATION_MIN_EVENTS:-5}
      RECOMMENDATION_MODEL_VERSION: ${RECOMMENDATION_MODEL_VERSION:-als-v1}
    command:
      [
        "/opt/spark/bin/spark-class",
        "org.apache.spark.deploy.master.Master",
        "--host",
        "0.0.0.0",
        "--port",
        "7077",
        "--webui-port",
        "8080",
      ]
    ports:
      - "7077:7077"
      - "8080:8080"
    volumes:
      - ./bigdata/spark:/opt/spark/work-dir/spark:ro
      - ./bigdata/data:/opt/spark/work-dir/data

  spark-worker:
    build:
      context: ./bigdata/spark
    image: smartfeed-spark:3.5.6
    container_name: smartfeed-spark-worker
    command:
      [
        "/opt/spark/bin/spark-class",
        "org.apache.spark.deploy.worker.Worker",
        "spark://spark-master:7077",
        "--cores",
        "1",
        "--memory",
        "1G",
        "--webui-port",
        "8081",
      ]
    depends_on:
      - spark-master
    volumes:
      - ./bigdata/spark:/opt/spark/work-dir/spark:ro
      - ./bigdata/data:/opt/spark/work-dir/data

  jupyter:
    image: jupyter/pyspark-notebook:python-3.11
    container_name: smartfeed-jupyter
    environment:
      JUPYTER_TOKEN: ${JUPYTER_TOKEN:-smartfeed}
      SPARK_MASTER_URL: spark://spark-master:7077
    ports:
      - "8888:8888"
    volumes:
      - ./bigdata/notebooks:/home/jovyan/work
    depends_on:
      - spark-master

volumes:
  postgres_data:
  mongo_data:
